function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return "-"; const [y,m,d] = iso.split("-"); return d+"/"+m+"/"+y; }
function initials(name){ const p = (name||"?").trim().split(/\s+/); return ((p[0]||"")[0]+((p[1]||"")[0]||"")).toUpperCase(); }
function esc(s){ return (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function currentTrimestre(){ const d = new Date(); return d.getFullYear() + "-Q" + (Math.floor(d.getMonth()/3)+1); }
function avatarHtml(user, size){
  size = size || 32;
  const fs = Math.round(size * 0.36);
  if(user && user.foto_url){ return `<div class="avatar" style="width:${size}px;height:${size}px;"><img src="${user.foto_url}" alt=""/></div>`; }
  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${fs}px;">${user?initials(user.nome):"?"}</div>`;
}
function toast(msg){
  document.querySelectorAll(".toast").forEach(el=>el.remove());

  el.textContent = msg;
  document.body.appendChild(el);

}

function getUser(id){ return DB.usuarios.find(u => u.id === id); }
function getDirectReports(id){ return DB.usuarios.filter(u => u.lider_id === id && u.ativo !== false); }
function getSubtreeIds(id){
  let ids = [id];
  getDirectReports(id).forEach(u => { ids = ids.concat(getSubtreeIds(u.id)); });
  return ids;
}
function tasksFor(userId){ return DB.tarefas.filter(t => t.atribuido_a === userId); }
function tasksForSubtree(id){
  const ids = new Set(getSubtreeIds(id).filter(x => x !== id));
  return DB.tarefas.filter(t => ids.has(t.atribuido_a));
}
function temaNome(id){ const t = DB.temas.find(x=>x.id===id); return t ? t.nome : "Geral"; }
function equipeNome(id){ const e = DB.equipes.find(x=>x.id===id); return e ? e.nome : null; }
function especialidadeNome(id){ const e = DB.especialidades.find(x=>x.id===id); return e ? e.nome : null; }
function addNotif(usuarioId, tipo, mensagem){
  return sb.from("notificacoes").insert({ usuario_id: usuarioId, tipo, mensagem });
}

function farolInfo(t){
  if(t.status === "concluida") return { label:"Concluído", cls:"ok" };
  if(t.status === "cancelada") return { label:"Cancelada", cls:"muted" };
  if(t.status === "impedida") return { label:"Impedida", cls:"warn" };
  if(t.status === "aguardando_reatribuicao") return { label:"Sem responsável", cls:"danger" };
  if(t.status === "pendente_aprovacao") return { label:"Aguardando aprovação", cls:"muted" };
  if(t.status === "recusada") return { label:"Recusada", cls:"muted" };
  const hoje = new Date(todayISO());
  const prazo = new Date(t.prazo);
  prazo.setDate(prazo.getDate() + (t.dias_pausados||0));
  const diff = Math.round((prazo - hoje) / 86400000);
  if(diff < 0) return { label:"Atrasado", cls:"danger" };
  if(diff <= 3) return { label:"Próximo do vencimento", cls:"warn" };
  return { label:"No prazo", cls:"accent" };
}
function statusLabel(s){
  return { a_fazer:"A fazer", em_andamento:"Em andamento", concluida:"Concluída", cancelada:"Cancelada",
    pendente_aprovacao:"Aguardando aprovação", recusada:"Recusada",
    aguardando_reatribuicao:"Aguardando reatribuição", impedida:"Impedida" }[s] || s;
}
function computePerformance(userId){
  const tasks = tasksFor(userId);
  const concluidas = tasks.filter(t => t.status === "concluida" && t.concluido_em);
  if(!concluidas.length) return null;
  const BASE = { Alta:100, Média:75, Baixa:50 };
  const ANTES = { Alta:200, Média:150, Baixa:100 };
  const ATRASO = { Alta:50, Média:38, Baixa:25 };
  let ganho = 0, referencia = 0;
  concluidas.forEach(t => {
    const prazoEfetivo = new Date(t.prazo+"T00:00:00");
    prazoEfetivo.setDate(prazoEfetivo.getDate() + (t.dias_pausados||0));
    const concluido = new Date(t.concluido_em.slice(0,10)+"T00:00:00");
    const base = BASE[t.prioridade] || 75;
    referencia += base;
    if(concluido.getTime() < prazoEfetivo.getTime()) ganho += (ANTES[t.prioridade] || base*2);
    else if(concluido.getTime() === prazoEfetivo.getTime()) ganho += base;
    else ganho += (ATRASO[t.prioridade] || base*0.5);
  });
  if(!referencia) return null;
  const pct = Math.max(0, Math.min(100, Math.round((ganho / referencia) * 100)));
  return { pct, total: concluidas.length };
}
function currentUser(){ return getUser(STATE.currentUserId); }
function go(screen){ STATE.screen = screen; render(); window.scrollTo(0,0); }

// ---------- GAUGE ----------
function gaugeSvg(pctRaw){
  const pct = Math.max(0, Math.min(100, pctRaw));
  const angle = 180 * (1 - pct/100);
  const rad = angle * Math.PI/180;
  const nx = (200 + 130*Math.cos(rad)).toFixed(1);
  const ny = (200 - 130*Math.sin(rad)).toFixed(1);
  const cls = pctRaw >= 90 ? "var(--ok-text)" : (pctRaw >= 70 ? "var(--warn-text)" : "var(--danger-text)");
  return `<svg width="100%" viewBox="0 0 400 250" role="img" style="max-width:280px;display:block;margin:0 auto;">
    <title>Ponteiro de eficiência de prazo</title><desc>${pctRaw}% de eficiência de prazo, meta 90%</desc>
    <path d="M 68 200 A 150 150 0 0 1 172.8 79.1" fill="none" stroke="#E24B4A" stroke-width="24" stroke-linecap="round"/>
    <path d="M 178.2 76.4 A 150 150 0 0 1 226.4 76.4" fill="none" stroke="#EF9F27" stroke-width="24" stroke-linecap="round"/>
    <path d="M 231.8 79.1 A 150 150 0 0 1 332 200" fill="none" stroke="#639922" stroke-width="24" stroke-linecap="round"/>
    <line x1="200" y1="200" x2="${nx}" y2="${ny}" stroke="var(--text)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="200" cy="200" r="7" fill="var(--text)"/>
    <text x="200" y="236" text-anchor="middle" style="font-size:22px;font-weight:700;fill:${cls};font-family:inherit;">${pctRaw}%</text>
  </svg>`;
}

function render(){
  document.querySelectorAll(".modal-overlay").forEach(el => el.remove());
  const app = document.getElementById("app");
  const cu = STATE.currentUserId ? currentUser() : null;

  if(STATE.screen === "loading") app.innerHTML = `<p style="padding:60px;text-align:center;color:#888;">Carregando…</p>`;
  else if(STATE.screen === "menu") app.innerHTML = renderMenu();
  else if(STATE.screen === "login") app.innerHTML = renderLogin();
  else if(STATE.screen === "org") app.innerHTML = cu ? renderShell(cu, "org", "Organograma", renderOrgContent()) : renderOrgPublic();
  else if(STATE.screen === "dashboard") app.innerHTML = cu ? renderShell(cu, "dashboard", "Dashboard", renderDashboard(cu)) : renderMenu();
  else if(STATE.screen === "main") app.innerHTML = cu ? renderShell(cu, STATE.tab==='equipe'?'equipe':'minhas', STATE.tab==='equipe'?'Minha equipe':'Minhas tarefas', renderMain()) : renderMenu();
  else if(STATE.screen === "perfil") app.innerHTML = cu ? renderShell(cu, "perfil", "Meu perfil", renderPerfilContent()) : renderMenu();
  else if(STATE.screen === "equipes") app.innerHTML = cu ? renderShell(cu, "equipes", "Equipes", renderEquipesContent()) : renderMenu();
  else if(STATE.screen === "mapa") app.innerHTML = cu ? renderShell(cu, "mapa", "Mapa da Equipe", renderMapaEquipeContent(cu)) : renderMenu();
  else if(STATE.screen === "escala") app.innerHTML = cu ? renderShell(cu, "escala", "Minha Escala", renderEscalaContent(cu)) : renderMenu();
  else if(STATE.screen === "chat") app.innerHTML = cu ? renderShell(cu, "chat", "Chat da Equipe", renderChatContent(cu)) : renderMenu();

  if(c.includes("planejamento") && c.includes("técnic")) return "&#128200;";
  if(c.includes("planejamento")) return "&#128203;";
  if(c.includes("elétric") || c.includes("eletric")) return "&#9889;";

  if(c.includes("mecânic") || c.includes("mecanic")) return "&#9881;";

function getMapaEquipeData(cu){
  const subtreeIds = new Set(getSubtreeIds(cu.id).filter(id => id !== cu.id));
  const pessoas = DB.usuarios.filter(u => subtreeIds.has(u.id) && u.ativo !== false);
  const ATIVOS = ["a_fazer","em_andamento","impedida"];
  const tarefasAtivas = DB.tarefas.filter(t => subtreeIds.has(t.atribuido_a) && ATIVOS.includes(t.status));

  const porPessoa = pessoas.map(p => {
    const minhas = tarefasAtivas.filter(t => t.atribuido_a === p.id);
    const emExecucao = minhas.some(t => t.status === "em_andamento");
    let status;
    if(minhas.length === 0) status = "Disponível";
    else if(minhas.length > 3) status = "Sobrecarregado";
    else if(emExecucao) status = "Em execução";
    else status = "Alocado";
    const frentes = [...new Set(minhas.map(t => temaNome(t.tema_id)))];
    return { pessoa: p, ativas: minhas.length, status, frentes, tarefas: minhas };
  });

  const temaIds = [...new Set(tarefasAtivas.map(t => t.tema_id))];
  const porFrente = temaIds.map(temaId => {
    const tarefasFrente = tarefasAtivas.filter(t => t.tema_id === temaId);
    const pessoasFrente = [...new Set(tarefasFrente.map(t => t.atribuido_a))].map(getUser).filter(Boolean);
    const temCritico = tarefasFrente.some(t => farolInfo(t).cls === "danger");
    const temAtencao = tarefasFrente.some(t => farolInfo(t).cls === "warn");
    const status = temCritico ? "Crítico" : (temAtencao ? "Atenção" : "Em andamento");
    return { nome: temaNome(temaId), pessoas: pessoasFrente, tarefas: tarefasFrente, status };
  }).sort((a,b) => (a.status==="Crítico"?0:a.status==="Atenção"?1:2) - (b.status==="Crítico"?0:b.status==="Atenção"?1:2));

  const semResponsavel = DB.tarefas.filter(t => t.status === "aguardando_reatribuicao" &&
    (t.equipe_lider_id === cu.id || subtreeIds.has(t.equipe_lider_id)));

  return { pessoas, porPessoa, porFrente, tarefasAtivas, semResponsavel };
}
function statusOperColor(s){
  return { "Disponível":"ok", "Alocado":"accent", "Em execução":"warn", "Sobrecarregado":"danger" }[s] || "muted";
}
function frenteStatusColor(s){
  return { "Em andamento":"accent", "Atenção":"warn", "Crítico":"danger" }[s] || "muted";
}
function getAlocacaoAtual(usuarioId){
  const hoje = todayISO();
  const minhas = DB.escalas.filter(e => e.usuario_id === usuarioId).sort((a,b)=>a.data_inicio.localeCompare(b.data_inicio));
  let atual = minhas.find(e => e.data_inicio <= hoje && hoje <= e.data_fim);
  if(!atual) atual = minhas.find(e => e.data_inicio > hoje);
  return atual || null;
}
function escalaStatus(e){
  const hoje = todayISO();
  if(hoje < e.data_inicio) return { label:"Agendada", cls:"accent" };
  if(hoje > e.data_fim) return { label:"Concluída", cls:"muted" };
  return { label:"Alocado", cls:"ok" };
}

async function sendMensagemEquipe(equipeId){
  const input = document.getElementById("chat-input");
  const texto = input.value.trim();
  if(!texto) return;
  input.value = "";

function renderEscalaGanttEquipe(cu){
  const reports = getDirectReports(cu.id);
  const reportIds = new Set(reports.map(r=>r.id));
  const limite = new Date(); limite.setDate(limite.getDate()-30);
  const limiteStr = limite.toISOString().slice(0,10);
  const entries = DB.escalas.filter(e => reportIds.has(e.usuario_id) && e.data_fim >= limiteStr);
  if(!entries.length) return "";
  const pessoas = reports.filter(r => entries.some(e => e.usuario_id === r.id));
  const rangeStart = entries.reduce((min,e) => e.data_inicio < min ? e.data_inicio : min, entries[0].data_inicio);
  const rangeEnd = entries.reduce((max,e) => e.data_fim > max ? e.data_fim : max, entries[0].data_fim);
  const startDate = new Date(rangeStart+"T00:00:00");
  const endDate = new Date(rangeEnd+"T00:00:00");
  const totalDays = Math.max(1, Math.round((endDate-startDate)/86400000) + 1);
  const dayOffset = d => Math.round((new Date(d+"T00:00:00") - startDate)/86400000);

  const rows = pessoas.map(p => {
    const bars = entries.filter(e => e.usuario_id === p.id).map(e => {
      const s = dayOffset(e.data_inicio), en = dayOffset(e.data_fim);
      const leftPct = (s/totalDays)*100, widthPct = ((en-s+1)/totalDays)*100;
      const cor = e.turno === "Noturno" ? "var(--steel-700)" : "var(--brand-blue)";
      return `<div title="${esc(p.nome)}: ${esc(e.frente)} (${e.turno}) ${fmtDate(e.data_inicio)}—${fmtDate(e.data_fim)}" style="position:absolute;left:${leftPct}%;width:${widthPct}%;top:4px;bottom:4px;background:${cor};border-radius:5px;"></div>`;
    }).join("");
    return `<div style="display:flex;align-items:center;gap:8px;height:34px;">
      <div style="width:100px;flex-shrink:0;font-size:11.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(p.nome)}</div>
      <div style="position:relative;flex:1;height:24px;background:var(--surface-2);border-radius:6px;">${bars}</div>
    </div>`;
  }).join("");

  return `<div class="card" style="margin-bottom:16px;overflow-x:auto;">
    <h3 style="margin-bottom:2px;">Linha do tempo</h3>
    <p class="muted-text" style="margin:0 0 10px;">${fmtDate(rangeStart)} — ${fmtDate(rangeEnd)} · azul = diurno, cinza-escuro = noturno</p>
    <div style="min-width:420px;display:flex;flex-direction:column;gap:4px;">${rows}</div>
  </div>`;
}

async function submitEscala(liderId){
  const usuarioId = document.getElementById("es-quem").value;
  const turno = document.getElementById("es-turno").value;
  const frente = document.getElementById("es-frente").value.trim();
  const localCodigo = document.getElementById("es-local-codigo").value.trim();
  const localDesc = document.getElementById("es-local-desc").value.trim();
  const dataInicio = document.getElementById("es-inicio").value;
  const dataFim = document.getElementById("es-fim").value;
  const observacao = document.getElementById("es-obs").value.trim();
  if(!usuarioId || !frente || !dataInicio || !dataFim) return;
  if(dataFim < dataInicio){ toast("A data de fim não pode ser antes do início."); return; }
  const ok = await mutate(sb.from("escalas").insert({
    usuario_id: usuarioId, turno, frente, local_codigo: localCodigo||null, local_descricao: localDesc||null,
    data_inicio: dataInicio, data_fim: dataFim, observacao, criado_por: liderId
  }));
  if(ok) render();
}

  await mutate(sb.from("escalas").delete().eq("id", id));

}

async function doLogin(){
  const email = document.getElementById("login-email").value.trim();
  const senha = document.getElementById("login-senha").value;
  if(!email || !senha) return;
  STATE.busy = true; render();
  const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
  STATE.busy = false;
  if(error){ toast("Erro ao entrar: " + error.message); render(); return; }
  await afterLogin(data.session);
}
async function resolveExtensibleId(table, selectId, newInputId, label){
  const val = document.getElementById(selectId).value;
  if(val !== "__nova__") return val || null;
  const nome = document.getElementById(newInputId).value.trim();
  if(!nome) return null;
  const { data, error } = await sb.from(table).insert({ nome }).select().single();
  if(error){ toast(`Erro ao criar ${label}: ` + error.message); return null; }
  return data.id;
}
async function doSignup(){
  const nome = document.getElementById("su-nome").value.trim();
  const cargo = document.getElementById("su-cargo").value.trim();
  const liderId = document.getElementById("su-lider").value || null;
  const equipeId = await resolveExtensibleId("equipes", "su-equipe", "su-nova-equipe", "equipe");
  const especialidadeId = await resolveExtensibleId("especialidades", "su-especialidade", "su-nova-especialidade", "especialidade");
  const email = document.getElementById("su-email").value.trim();
  const senha = document.getElementById("su-senha").value;
  if(!nome || !cargo || !email || !senha){ toast("Preencha todos os campos."); return; }
  STATE.busy = true; render();
  const { data, error } = await sb.auth.signUp({
    email, password: senha,
    options: { data: { nome, cargo, lider_id: liderId, equipe_id: equipeId, especialidade_id: especialidadeId } }
  });
  STATE.busy = false;
  if(error){ toast("Erro ao criar conta: " + error.message); render(); return; }
  if(data.session){ await afterLogin(data.session); }
  else{ toast("Conta criada! Verifique seu e-mail para confirmar antes de entrar."); STATE.authMode = "login"; go("login"); }
}
let realtimeChannel = null;
let realtimeDebounce = null;
function setupRealtime(){
  if(realtimeChannel) return;
  realtimeChannel = sb.channel("app-changes")
    .on("postgres_changes", { event:"*", schema:"public", table:"tarefas" }, handleRealtimeChange)
    .on("postgres_changes", { event:"*", schema:"public", table:"comentarios_tarefa" }, handleRealtimeChange)
    .on("postgres_changes", { event:"*", schema:"public", table:"notificacoes" }, handleRealtimeChange)
    .on("postgres_changes", { event:"*", schema:"public", table:"ferias" }, handleRealtimeChange)
    .on("postgres_changes", { event:"*", schema:"public", table:"reprogramacoes" }, handleRealtimeChange)
    .on("postgres_changes", { event:"*", schema:"public", table:"mensagens_equipe" }, handleRealtimeChange)
    .subscribe();
}
function teardownRealtime(){
  if(realtimeChannel){ sb.removeChannel(realtimeChannel); realtimeChannel = null; }
}
function handleRealtimeChange(){
  clearTimeout(realtimeDebounce);
  realtimeDebounce = setTimeout(async () => {
    await loadAll();
    const tag = document.activeElement && document.activeElement.tagName;
    if(tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
    render();
  }, 500);
}
async function afterLogin(session){
  SESSION = session;
  await loadAll();
  STATE.currentUserId = session.user.id;
  if(!getUser(STATE.currentUserId)){
    toast("Seu perfil ainda está sendo criado, tente novamente em instantes.");
  }
  STATE.tab = "minhas"; STATE.view = "kanban";
  setupRealtime();
  go("dashboard");
}
async function logout(){
  await sb.auth.signOut();
  teardownRealtime();
  SESSION = null; STATE.currentUserId = null; STATE.notifOpen = false;
  go("menu");
}

let rankingCache = {};
async function ensureRanking(equipeId){
  const monthKey = new Date().toISOString().slice(0,7);
  if(rankingCache[equipeId] && rankingCache[equipeId].month === monthKey) return;
  const { data, error } = await sb.rpc("ranking_mensal", { p_equipe_id: equipeId });
  if(error){ toast("Erro ao calcular ranking: " + error.message); return; }
  rankingCache[equipeId] = { month: monthKey, data: data || [] };
  render();
}
function getEscopoTarefas(cu){
  const hasTeam = getDirectReports(cu.id).length > 0;
  const own = tasksFor(cu.id);
  if(!hasTeam) return own;
  const subtree = tasksForSubtree(cu.id);
  const ids = new Set();
  const all = [];
  [...own, ...subtree].forEach(t => { if(!ids.has(t.id)){ ids.add(t.id); all.push(t); } });
  return all;
}
function prazoLabel(t){
  const hoje = new Date(todayISO());
  const prazo = new Date(t.prazo);
  prazo.setDate(prazo.getDate() + (t.dias_pausados||0));
  const diff = Math.round((prazo - hoje) / 86400000);
  if(diff < 0) return `atrasado há ${Math.abs(diff)}d`;
  if(diff === 0) return "vence hoje";
  if(diff === 1) return "amanhã";
  return `em ${diff} dias`;
}
function formatQuando(iso){
  const d = new Date(iso);
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const ontem = new Date(hoje); ontem.setDate(ontem.getDate()-1);
  const dData = new Date(d); dData.setHours(0,0,0,0);
  const hora = d.toLocaleTimeString("pt-BR", { hour:"2-digit", minute:"2-digit" });
  if(dData.getTime() === hoje.getTime()) return `Hoje, ${hora}`;
  if(dData.getTime() === ontem.getTime()) return `Ontem, ${hora}`;
  return fmtDate(d.toISOString().slice(0,10)) + ", " + hora;
}
function getAtividadesRecentes(escopo){
  const idsEscopo = new Set(escopo.map(t=>t.id));
  const tituloDe = id => { const t = escopo.find(x=>x.id===id); return t ? t.titulo : "tarefa"; };
  const primeiroNome = u => u ? u.nome.split(" ")[0] : "Alguém";
  const eventos = [];
  DB.comentarios.filter(c => idsEscopo.has(c.tarefa_id)).forEach(c => {
    const nome = primeiroNome(getUser(c.usuario_id));
    let texto, icone;
    if(c.tipo === "impedimento"){ texto = `${nome} reportou impedimento em "${tituloDe(c.tarefa_id)}"`; icone = "&#9888;"; }
    else if(c.tipo === "resolucao"){ texto = `${nome} resolveu o impedimento em "${tituloDe(c.tarefa_id)}"`; icone = "&#10003;"; }
    else { texto = `${nome} comentou em "${tituloDe(c.tarefa_id)}"`; icone = "&#128172;"; }
    eventos.push({ texto, quando: c.criado_em, icone });
  });
  DB.historico.filter(h => idsEscopo.has(h.tarefa_id)).forEach(h => {
    const nome = primeiroNome(getUser(h.alterado_por));
    const campoLabel = { prazo:"o prazo", prioridade:"a prioridade", atribuido_a:"o responsável" }[h.campo] || h.campo;
    eventos.push({ texto: `${nome} alterou ${campoLabel} de "${tituloDe(h.tarefa_id)}"`, quando: h.alterado_em, icone:"&#9998;" });
  });
  escopo.forEach(t => {
    eventos.push({ texto: `${primeiroNome(getUser(t.criado_por))} criou a tarefa "${t.titulo}"`, quando: t.criado_em, icone:"&#10133;" });
    if(t.status === "concluida" && t.concluido_em){
      eventos.push({ texto: `${primeiroNome(getUser(t.atribuido_a))} concluiu "${t.titulo}"`, quando: t.concluido_em, icone:"&#9989;" });
    }
  });
  eventos.sort((a,b) => new Date(b.quando) - new Date(a.quando));
  return eventos.slice(0, 6);
}

function getEquipesRelevantes(cu){
  const ids = new Set();

function renderRankingCardFor(cu, equipeId){
  ensureRanking(equipeId);
  const monthKey = new Date().toISOString().slice(0,7);
  const cached = rankingCache[equipeId];
  const pontosMap = {};
  if(cached && cached.month === monthKey){ cached.data.forEach(r => { pontosMap[r.usuario_id] = r.pontos; }); }
  const membros = DB.usuarios.filter(u => u.equipe_id === equipeId && u.ativo !== false);
  const ranked = membros.map(u => ({ u, pontos: pontosMap[u.id] || 0 })).sort((a,b) => b.pontos - a.pontos);
  const mesNome = new Date().toLocaleDateString("pt-BR", { month:"long", year:"numeric" });
  const nomeEquipe = equipeNome(equipeId) || "Equipe";
  return `<div class="card" style="margin-bottom:16px;">
    <p class="muted-text" style="margin-bottom:8px;">&#127942; Ranking · ${esc(nomeEquipe)} · ${esc(mesNome)}</p>

function feriasStatus(f){
  const hoje = todayISO();
  if(hoje < f.data_inicio) return { label:"Agendada", cls:"accent" };
  if(hoje > f.data_fim) return { label:"Concluída", cls:"muted" };
  return { label:"Em andamento", cls:"warn" };
}
function renderFeriasGantt(cu){
  const reports = getDirectReports(cu.id);
  const reportIds = new Set(reports.map(r=>r.id));
  const limite = new Date(); limite.setDate(limite.getDate()-30);
  const limiteStr = limite.toISOString().slice(0,10);
  const entries = DB.ferias.filter(f => reportIds.has(f.usuario_id) && f.data_fim >= limiteStr);
  if(!entries.length) return "";
  const pessoas = reports.filter(r => entries.some(e => e.usuario_id === r.id));
  const rangeStart = entries.reduce((min,e) => e.data_inicio < min ? e.data_inicio : min, entries[0].data_inicio);
  const rangeEnd = entries.reduce((max,e) => e.data_fim > max ? e.data_fim : max, entries[0].data_fim);
  const startDate = new Date(rangeStart+"T00:00:00");
  const endDate = new Date(rangeEnd+"T00:00:00");
  const totalDays = Math.max(1, Math.round((endDate-startDate)/86400000) + 1);
  const dayOffset = d => Math.round((new Date(d+"T00:00:00") - startDate)/86400000);

  const dayCounts = new Array(totalDays).fill(0);
  entries.forEach(e => {
    const s = Math.max(0, dayOffset(e.data_inicio)), en = Math.min(totalDays-1, dayOffset(e.data_fim));
    for(let d=s; d<=en; d++) dayCounts[d]++;
  });
  let conflitos = 0;
  for(let d=0; d<totalDays; d++){ if(dayCounts[d] >= 2) conflitos++; }

  const rows = pessoas.map(p => {
    const bars = entries.filter(e => e.usuario_id === p.id).map(e => {
      const s = dayOffset(e.data_inicio), en = dayOffset(e.data_fim);
      let overlap = false;
      for(let d=Math.max(0,s); d<=Math.min(totalDays-1,en); d++){ if(dayCounts[d] >= 2){ overlap = true; break; } }
      const leftPct = (s/totalDays)*100, widthPct = ((en-s+1)/totalDays)*100;
      const color = overlap ? "var(--danger)" : "var(--brand-blue)";
      return `<div title="${esc(p.nome)}: ${fmtDate(e.data_inicio)} — ${fmtDate(e.data_fim)}${overlap?' (sobreposição)':''}" style="position:absolute;left:${leftPct}%;width:${widthPct}%;top:4px;bottom:4px;background:${color};border-radius:5px;"></div>`;
    }).join("");
    return `<div style="display:flex;align-items:center;gap:8px;height:34px;">
      <div style="width:100px;flex-shrink:0;font-size:11.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(p.nome)}</div>
      <div style="position:relative;flex:1;height:24px;background:var(--surface-2);border-radius:6px;">${bars}</div>
    </div>`;
  }).join("");

  return `<div class="card" style="margin-bottom:16px;overflow-x:auto;">
    <h3 style="margin-bottom:2px;">Linha do tempo</h3>
    <p class="muted-text" style="margin:0 0 4px;">${fmtDate(rangeStart)} — ${fmtDate(rangeEnd)}</p>
    ${conflitos ? `<p style="font-size:12px;color:var(--danger-text);margin:0 0 10px;">&#9888; períodos em vermelho têm mais de uma pessoa de férias ao mesmo tempo</p>`
                : `<p class="muted-text" style="margin:0 0 10px;">Nenhuma sobreposição nesse período.</p>`}
    <div style="min-width:420px;display:flex;flex-direction:column;gap:4px;">${rows}</div>
  </div>`;
}
function addMonths(dateStr, months){
  const d = new Date(dateStr+"T00:00:00");
  d.setMonth(d.getMonth()+months);
  return d.toISOString().slice(0,10);
}
function calcularCicloFerias(u){
  if(!u.data_admissao) return null;
  const concluidas = DB.ferias.filter(f => f.usuario_id===u.id && f.data_fim <= todayISO()).sort((a,b)=>b.data_fim.localeCompare(a.data_fim));
  const baseAutomatica = concluidas.length ? concluidas[0].data_fim : u.data_admissao;
  const baseCiclo = u.ultimo_retorno_ferias || baseAutomatica;
  const vencimento1 = addMonths(baseCiclo, 12);
  const prazoMax = addMonths(baseCiclo, 24);
  const hoje = todayISO();
  const diasAteLimite = Math.round((new Date(prazoMax+"T00:00:00") - new Date(hoje+"T00:00:00"))/86400000);
  let status;
  if(diasAteLimite <= 60) status = { label:"Crítico · 2ª férias", cls:"danger" };
  else if(diasAteLimite <= 90) status = { label:"Atenção", cls:"warn" };
  else if(hoje >= vencimento1) status = { label:"Vencido · 1ª férias", cls:"orange" };
  else status = { label:"Ok", cls:"ok" };
  const sugestaoRetorno = (concluidas.length && concluidas[0].data_fim !== u.ultimo_retorno_ferias) ? concluidas[0].data_fim : null;
  return { baseCiclo, vencimento1, prazoMax, diasAteLimite, status, sugestaoRetorno };
}
function calcularIdade(dataNascimento){
  if(!dataNascimento) return null;
  const hoje = new Date();
  const nasc = new Date(dataNascimento+"T00:00:00");
  let idade = hoje.getFullYear() - nasc.getFullYear();
  const m = hoje.getMonth() - nasc.getMonth();
  if(m < 0 || (m===0 && hoje.getDate() < nasc.getDate())) idade--;
  return idade;
}

        const decorridoDias = totalDias - ciclo.diasAteLimite;

            </div></div>

          <div class="row" style="gap:6px;flex-wrap:wrap;">

    ${semData.length ? `<p style="color:#9fb0be;font-size:11.5px;margin:10px 0 0;">${semData.length} pessoa(s) sem data de admissão — cadastre em "Gerenciar equipe" pra entrar no controle.</p>` : ""}

async function salvarAvaliacao(lideradoId){
  const trimestre = currentTrimestre();
  const observacoes = document.getElementById("aval-obs").value.trim();
  const { data: avalRow, error: avalErr } = await sb.from("avaliacoes")
    .upsert({ usuario_avaliado_id: lideradoId, avaliador_id: STATE.currentUserId, trimestre, observacoes },
      { onConflict: "usuario_avaliado_id,trimestre" })
    .select().single();
  if(avalErr){ toast("Erro: " + avalErr.message); return; }
  for(const c of DB.criterios){
    const row = document.querySelector(`.star-row[data-criterio="${c.id}"]`);
    const nota = row ? row.querySelectorAll(".star.filled").length || 3 : 3;
    await sb.from("avaliacoes_notas").upsert(
      { avaliacao_id: avalRow.id, criterio_id: c.id, nota },

}

// ---------- Desvios ----------
function renderDesvios(cu){
  const subtreeIds = new Set(getSubtreeIds(cu.id).filter(id=>id!==cu.id));
  const subtreeTaskIds = new Set(DB.tarefas.filter(t=>subtreeIds.has(t.atribuido_a)).map(t=>t.id));
  const imped = DB.comentarios.filter(c => c.tipo==="impedimento" && subtreeTaskIds.has(c.tarefa_id));
  const resolucoes = DB.comentarios.filter(c => c.tipo==="resolucao" && subtreeTaskIds.has(c.tarefa_id));
  const diasTotal = resolucoes.reduce((s,c)=>s+(c.dias||0),0);
  const tempoMedio = resolucoes.length ? (diasTotal/resolucoes.length).toFixed(1) : "-";
  const counts = {};
  imped.forEach(c => { const cat = DB.categorias.find(x=>x.id===c.categoria_id); const nome = cat?cat.nome:"Outro"; counts[nome] = (counts[nome]||0)+1; });
  const labels = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  return `
    <p class="muted-text" style="margin-bottom:14px;">Visível só para você · motivos de impedimento da equipe</p>
    <div class="grid3" style="margin-bottom:20px;">
      <div class="card" style="text-align:center;"><p class="muted-text">Impedimentos</p><p style="font-size:20px;font-weight:700;margin:0;">${imped.length}</p></div>
      <div class="card" style="text-align:center;"><p class="muted-text">Dias parados</p><p style="font-size:20px;font-weight:700;margin:0;">${diasTotal}</p></div>
      <div class="card" style="text-align:center;"><p class="muted-text">Tempo médio p/ resolver</p><p style="font-size:20px;font-weight:700;margin:0;">${tempoMedio}${tempoMedio!=="-"?" dias":""}</p></div>
    </div>
    ${labels.length ? `<div style="position:relative;width:100%;height:${Math.max(160, labels.length*44+60)}px;">
      <canvas id="devios-canvas" role="img" aria-label="Motivos de impedimento mais frequentes">${labels.map(l=>l+": "+counts[l]).join(". ")}</canvas>
    </div>` : `<p class="empty-hint">Nenhum impedimento registrado ainda.</p>`}`;
}
function renderDeviosChart(){
  const canvas = document.getElementById("devios-canvas");
  if(!canvas || typeof Chart === "undefined") return;
  const cu = currentUser();
  const subtreeIds = new Set(getSubtreeIds(cu.id).filter(id=>id!==cu.id));
  const subtreeTaskIds = new Set(DB.tarefas.filter(t=>subtreeIds.has(t.atribuido_a)).map(t=>t.id));
  const imped = DB.comentarios.filter(c => c.tipo==="impedimento" && subtreeTaskIds.has(c.tarefa_id));
  const counts = {};
  imped.forEach(c => { const cat = DB.categorias.find(x=>x.id===c.categoria_id); const nome = cat?cat.nome:"Outro"; counts[nome] = (counts[nome]||0)+1; });
  const labels = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(deviosChart){ deviosChart.destroy(); deviosChart = null; }
  if(!labels.length) return;
  deviosChart = new Chart(canvas, {
    type: "bar",
    data: { labels, datasets: [{ data: labels.map(l=>counts[l]), backgroundColor: "#2a78d6", borderRadius: 4, barThickness: 22 }] },
    options: { indexAxis:"y", responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{ x:{ beginAtZero:true, ticks:{ stepSize:1, color:"#898781" }, grid:{ color:"#e1e0d9" } }, y:{ ticks:{ color:"#52514e" }, grid:{ display:false } } } }
  });
}

async function removerColaborador(userId){
  const u = getUser(userId);

document.getElementById("hidden-photo-input").addEventListener("change", async function(e){

  if(!file || !STATE.photoUploadTarget) return;

});

const STATUS_FILTER_OPTS = ["a_fazer","em_andamento","concluida","impedida","cancelada"];
function applyStatusFilter(tasks){
  if(!STATE.filterStatusMulti || !STATE.filterStatusMulti.length) return tasks.filter(t => t.status !== "cancelada");
  return tasks.filter(t => STATE.filterStatusMulti.includes(t.status));
}
function toggleStatusFilter(s){
  const idx = STATE.filterStatusMulti.indexOf(s);
  if(idx >= 0) STATE.filterStatusMulti.splice(idx, 1); else STATE.filterStatusMulti.push(s);
  render();
}
function renderStatusFilterPanel(){

      <span style="font-size:13px;">${statusLabel(s)}</span>

function badgeHtml(t){ const f = farolInfo(t); return `<span class="badge ${f.cls}">${f.label}</span>`; }

function kanbanColHtml(title, count, bodyHtml, style){

    const cols = { a_fazer: [], em_andamento: [], concluida: [] };
    tasks.forEach(t => { if(cols[t.status]) cols[t.status].push(t); });
    return `<div class="grid3">${["a_fazer","em_andamento","concluida"].map(s =>

      html += `<div class="card" style="background:var(--accent-bg);border-color:#f0cfa8;margin-bottom:14px;">

        ` : `<div class="row"><button class="ghost" onclick="STATE.reprogramacaoRecusarOpen='${pendente.id}';render()">Recusar</button><button class="primary" onclick="aprovarReprogramacao('${pendente.id}','${t.id}')">Aprovar novo prazo</button></div>`}
      </div>`;

      html += `<div class="card" style="background:var(--surface-2);margin-bottom:14px;">
        <p style="font-size:12.5px;margin:0;">&#8987; Você pediu pra mudar o prazo pra <span class="mono">${fmtDate(pendente.prazo_sugerido)}</span> — aguardando seu líder aprovar.</p>
      </div>`;
    }

    html += STATE.reprogramarOpen === t.id ? `<div class="card" style="margin-bottom:14px;">

async function solicitarReprogramacao(taskId){
  const novoPrazo = document.getElementById("reprog-prazo-input").value;
  const justificativa = document.getElementById("reprog-justificativa").value.trim();
  if(!novoPrazo || !justificativa) return;
  const t = DB.tarefas.find(x => x.id === taskId);
  const cu = currentUser();
  const ok = await mutate(sb.from("reprogramacoes").insert({
    tarefa_id: taskId, solicitado_por: cu.id, prazo_atual: t.prazo, prazo_sugerido: novoPrazo, justificativa
  }));
  if(ok && cu.lider_id) await addNotif(cu.lider_id, "reprogramacao_solicitada", `${cu.nome} pediu pra mudar o prazo de "${t.titulo}"`);
  STATE.reprogramarOpen = null;
  await loadAll(); openTask(taskId);
}
async function aprovarReprogramacao(reprogId, taskId){
  const r = DB.reprogramacoes.find(x => x.id === reprogId);
  const okTarefa = await mutate(sb.from("tarefas").update({ prazo: r.prazo_sugerido }).eq("id", taskId));
  if(okTarefa){
    await sb.from("reprogramacoes").update({ status:"aprovada", decidido_por: STATE.currentUserId, decidido_em: new Date().toISOString() }).eq("id", reprogId);
    const t = DB.tarefas.find(x => x.id === taskId);
    if(t) await addNotif(t.atribuido_a, "reprogramacao_aprovada", `Seu novo prazo pra "${t.titulo}" foi aprovado: ${fmtDate(r.prazo_sugerido)}`);
  }
  await loadAll(); openTask(taskId);
}
async function recusarReprogramacao(reprogId, taskId){
  const novoPrazo = document.getElementById("reprog-novo-prazo").value;
  const resposta = document.getElementById("reprog-resposta").value.trim();
  const ok = await mutate(sb.from("reprogramacoes").update({
    status:"recusada", resposta_gestor: resposta, decidido_por: STATE.currentUserId, decidido_em: new Date().toISOString()
  }).eq("id", reprogId));
  if(ok && novoPrazo){
    await sb.from("tarefas").update({ prazo: novoPrazo }).eq("id", taskId);
  }
  const t = DB.tarefas.find(x => x.id === taskId);
  if(ok && t) await addNotif(t.atribuido_a, "reprogramacao_recusada", `Seu pedido de novo prazo pra "${t.titulo}" foi recusado`);
  STATE.reprogramacaoRecusarOpen = null;
  await loadAll(); openTask(taskId);
}

    <div class="row">
      <input id="checklist-input" placeholder="Adicionar item" />
      <button aria-label="Adicionar item" onclick="addSubtarefa('${taskId}')">+</button>
    </div>
  </div>`;
}
async function addSubtarefa(taskId){
  const input = document.getElementById("checklist-input");
  const descricao = input.value.trim();
  if(!descricao) return;
  await mutate(sb.from("subtarefas").insert({ tarefa_id: taskId, descricao, criado_por: STATE.currentUserId }));
  openTask(taskId);
}
async function toggleSubtarefa(id, checked){
  await mutate(sb.from("subtarefas").update({ concluido: checked }).eq("id", id));
  openTask(STATE.openTaskId);
}
async function removerSubtarefa(id){
  await mutate(sb.from("subtarefas").delete().eq("id", id));
  openTask(STATE.openTaskId);
}
function openTask(id){ STATE.openTaskId = id; STATE.taskImpedimentoOpen = false; render(); }
function closeTask(){ STATE.openTaskId = null; document.querySelectorAll(".modal-overlay").forEach(el=>el.remove()); }
function renderTaskModal(){
  const t = DB.tarefas.find(x => x.id === STATE.openTaskId);
  if(!t) return "";
  const cu = currentUser();
  const assignee = getUser(t.atribuido_a);
  const isOwner = t.atribuido_a === cu.id;
  const isLeaderOfOwner = assignee && assignee.lider_id === cu.id;
  const isAncestorOfOwner = assignee && assignee.id !== cu.id && getSubtreeIds(cu.id).includes(assignee.id);
  const comments = DB.comentarios.filter(c => c.tarefa_id === t.id).sort((a,b)=>new Date(a.criado_em)-new Date(b.criado_em));
  const catOpts = DB.categorias.map(c=>`<option value="${c.id}">${esc(c.nome)}</option>`).join("");
  return `<div class="modal-overlay" onclick="if(event.target===this) closeTask()">
    <div class="modal">
      <div class="row" style="justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
        <h2>${esc(t.titulo)}</h2><button class="ghost small" onclick="closeTask()" aria-label="Fechar">&#10005;</button>
      </div>
      <p class="muted-text" style="margin-bottom:10px;">${assignee?esc(assignee.nome):"Sem responsável"} · ${esc(temaNome(t.tema_id))} · prazo ${fmtDate(t.prazo)}</p>
      <div class="row" style="margin-bottom:14px;gap:6px;">
        ${badgeHtml(t)}
        ${(isOwner || isAncestorOfOwner)
          ? `<select onchange="changePrioridade('${t.id}', this.value)" style="width:auto;padding:3px 8px;font-size:11px;">
              <option value="Alta" ${t.prioridade==='Alta'?'selected':''}>Alta</option>
              <option value="Média" ${t.prioridade==='Média'?'selected':''}>Média</option>
              <option value="Baixa" ${t.prioridade==='Baixa'?'selected':''}>Baixa</option>
            </select>`
          : `<span class="badge muted">${esc(t.prioridade)}</span>`}
      </div>
      ${renderInstrucao(t, isAncestorOfOwner)}
      ${isOwner && ["a_fazer","em_andamento","concluida"].includes(t.status) ? `
        <label class="field-label">Meu status</label>
        <select onchange="changeStatus('${t.id}', this.value)" style="margin-bottom:14px;">
          <option value="a_fazer" ${t.status==='a_fazer'?'selected':''}>A fazer</option>
          <option value="em_andamento" ${t.status==='em_andamento'?'selected':''}>Em andamento</option>
          <option value="concluida" ${t.status==='concluida'?'selected':''}>Concluída</option>
        </select>` : ""}
      ${renderReprogramacao(t, isOwner, isAncestorOfOwner)}
      ${isLeaderOfOwner && t.status === "impedida" ? `
        <button class="primary" style="width:100%;margin-bottom:14px;" onclick="resolverImpedimento('${t.id}')">Marcar impedimento como resolvido</button>` : ""}
      ${isAncestorOfOwner && ["a_fazer","em_andamento","impedida"].includes(t.status) ? `
        <button style="width:100%;margin-bottom:14px;color:var(--danger);" onclick="cancelarTarefa('${t.id}')">Cancelar tarefa</button>` : ""}
      ${renderChecklist(t.id)}
      <div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px;">
        <h3 style="margin-bottom:10px;">Comentários</h3>
        <div style="display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;margin-bottom:10px;">
          ${comments.length ? comments.map(c => {
            const autor = getUser(c.usuario_id);
            const cls = c.tipo==='impedimento' ? 'imp' : (c.tipo==='resolucao' ? 'res' : '');
            const icon = c.tipo==='impedimento' ? ' &#9888;' : (c.tipo==='resolucao' ? ' &#10003;' : '');
            return `<div class="msg">${avatarHtml(autor,22)}<div class="msg-bubble ${cls}">
              <div style="font-size:11px;font-weight:600;margin-bottom:2px;">${autor?esc(autor.nome):""}${icon}</div>
              <div style="font-size:13px;">${esc(c.texto)}</div>
              ${c.anexo_url ? `<a href="${c.anexo_url}" target="_blank" rel="noopener"><img src="${c.anexo_url}" style="max-width:160px;max-height:120px;border-radius:8px;margin-top:6px;display:block;object-fit:cover;" alt="Foto anexada"/></a>` : ""}
              </div></div>`;
          }).join("") : `<p class="empty-hint" style="padding:10px 0;">Nenhum comentário ainda.</p>`}
        </div>
        <div id="comment-photo-preview" style="display:none;margin-bottom:8px;"></div>
        <div class="row">
          <button class="ghost small" onclick="triggerCommentPhoto()" aria-label="Anexar foto">&#128247;</button>
          <input id="comment-input" placeholder="Escrever comentário" style="flex:1;" />
          <button aria-label="Enviar" onclick="sendComment('${t.id}')">&#10148;</button>
        </div>
      </div>
      ${isOwner && t.status !== "impedida" && t.status !== "concluida" ? `
        ${STATE.taskImpedimentoOpen ? `
          <div class="card" style="background:var(--warn-bg);border-color:#f0d9ae;">
            <p style="font-size:13px;font-weight:700;color:var(--warn-text);margin:0 0 8px;">Reportar impedimento</p>
            <label class="field-label">Categoria</label>
            <select id="imp-categoria" style="margin-bottom:8px;">${catOpts}<option value="__nova__">+ Cadastrar nova categoria</option></select>
            <input id="imp-nova-categoria" placeholder="Nome da nova categoria" style="display:none;margin-bottom:8px;" />
            <label class="field-label">O que está faltando</label>
            <input id="imp-recurso" placeholder="Ex: torquímetro" style="margin-bottom:10px;" />
            <div class="row"><button class="ghost" onclick="STATE.taskImpedimentoOpen=false;render()">Cancelar</button><button class="primary" onclick="enviarImpedimento('${t.id}')">Enviar ao líder</button></div>
          </div>` : `<button style="width:100%;color:var(--warn-text);" onclick="STATE.taskImpedimentoOpen=true;render()"><span style="margin-right:6px;">&#9888;</span>Reportar impedimento</button>`}
      ` : ""}
    </div>
  </div>`;
}
async function changeStatus(taskId, status){
  await mutate(sb.from("tarefas").update({ status }).eq("id", taskId));
  openTask(taskId);
}
async function changePrioridade(taskId, prioridade){
  await mutate(sb.from("tarefas").update({ prioridade }).eq("id", taskId));
  openTask(taskId);
}
async function cancelarTarefa(taskId){
  if(!confirm("Cancelar esta tarefa? Ela sai da lista ativa, mas o histórico continua registrado.")) return;
  const ok = await mutate(sb.from("tarefas").update({ status:"cancelada" }).eq("id", taskId));
  if(ok) closeTask();
  render();
}
let pendingCommentPhoto = null;
function triggerCommentPhoto(){ document.getElementById("hidden-comment-photo-input").click(); }
document.getElementById("hidden-comment-photo-input").addEventListener("change", e => {
  const file = e.target.files[0];
  if(!file) return;
  pendingCommentPhoto = file;
  const box = document.getElementById("comment-photo-preview");
  if(box){
    box.style.display = "block";
    box.innerHTML = `<span class="badge accent">&#128247; ${esc(file.name)}</span> <button class="ghost small" onclick="pendingCommentPhoto=null;document.getElementById('comment-photo-preview').style.display='none';">&#10005;</button>`;
  }
});
async function uploadAnexo(file, taskId){
  const path = `${taskId}/${uid()}-${file.name}`.replace(/\s+/g, "_");
  const { error } = await sb.storage.from("anexos").upload(path, file);
  if(error){ toast("Erro ao subir foto: " + error.message); return null; }
  const { data } = sb.storage.from("anexos").getPublicUrl(path);
  return data.publicUrl;
}
function uid(){ return Math.random().toString(36).slice(2) + Date.now().toString(36); }
async function sendComment(taskId){
  const input = document.getElementById("comment-input");
  const texto = input.value.trim();
  if(!texto && !pendingCommentPhoto) return;
  let anexoUrl = null;
  if(pendingCommentPhoto){
    anexoUrl = await uploadAnexo(pendingCommentPhoto, taskId);
    pendingCommentPhoto = null;
  }
  await mutate(sb.from("comentarios_tarefa").insert({ tarefa_id: taskId, usuario_id: STATE.currentUserId, tipo:"comentario", texto: texto || "(foto)", anexo_url: anexoUrl }));
  openTask(taskId);
}
document.addEventListener("change", e => {
  if(e.target && e.target.id === "imp-categoria"){
    const box = document.getElementById("imp-nova-categoria");
    if(box) box.style.display = e.target.value === "__nova__" ? "block" : "none";
  }
  if(e.target && /-(equipe|especialidade)$/.test(e.target.id)){
    const boxId = e.target.id.replace(/-(equipe|especialidade)$/, "-nova-$1");
    const box = document.getElementById(boxId);
    if(box) box.style.display = e.target.value === "__nova__" ? "block" : "none";
  }
});
async function enviarImpedimento(taskId){
  let categoriaId = document.getElementById("imp-categoria").value;
  if(categoriaId === "__nova__"){
    const nome = document.getElementById("imp-nova-categoria").value.trim();
    if(!nome) return;
    const { data, error } = await sb.from("categorias_impedimento").insert({ nome }).select().single();
    if(error){ toast("Erro: " + error.message); return; }
    categoriaId = data.id;
  }
  const recurso = document.getElementById("imp-recurso").value.trim();
  if(!recurso) return;
  const t = DB.tarefas.find(x => x.id === taskId);
  const cu = currentUser();
  const ok = await mutate(sb.from("tarefas").update({ status:"impedida", impedido_desde: new Date().toISOString() }).eq("id", taskId));
  if(ok){
    await sb.from("comentarios_tarefa").insert({ tarefa_id: taskId, usuario_id: cu.id, tipo:"impedimento", categoria_id: categoriaId,
      texto: `Falta ${recurso}. Não consigo avançar sem isso.` });
    if(cu.lider_id) await addNotif(cu.lider_id, "impedimento_reportado", `${cu.nome} reportou impedimento em "${t.titulo}"`);
  }
  STATE.taskImpedimentoOpen = false;
  await loadAll(); openTask(taskId);
}
async function resolverImpedimento(taskId){
  const t = DB.tarefas.find(x => x.id === taskId);
  let dias = 1;
  if(t.impedido_desde){ dias = Math.max(1, Math.round((new Date() - new Date(t.impedido_desde)) / 86400000)); }
  const ok = await mutate(sb.from("tarefas").update({
    status:"em_andamento", impedido_desde: null, dias_pausados: (t.dias_pausados||0) + dias
  }).eq("id", taskId));
  if(ok){
    await sb.from("comentarios_tarefa").insert({ tarefa_id: taskId, usuario_id: STATE.currentUserId, tipo:"resolucao", dias,
      texto: `Impedimento resolvido após ${dias} dia(s).` });
  }
  await loadAll(); openTask(taskId);
}

// ---------- init ----------
(async function init(){
  render();
  const { data: { session } } = await sb.auth.getSession();
  if(session){ await afterLogin(session); }
  else{ await loadPublicOrg(); STATE.screen = "menu"; render(); }
})();

if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
