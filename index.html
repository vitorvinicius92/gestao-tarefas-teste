function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return "-"; const [y,m,d] = iso.split("-"); return d+"/"+m+"/"+y; }
function initials(name){ const p = (name||"?").trim().split(/\s+/); return ((p[0]||"")[0]+((p[1]||"")[0]||"")).toUpperCase(); }
function esc(s){ return (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function currentTrimestre(){ const d = new Date(); return d.getFullYear() + "-Q" + (Math.floor(d.getMonth()/3)+1); }
function avatarHtml(user, size){
  size = size || 32;
  const fs = Math.round(size * 0.36);

  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${fs}px;">${user?initials(user.nome):"?"}</div>`;
}

// ---------- DATA LOADING ----------
async function loadPublicOrg(){
  const [u, eq, es] = await Promise.all([
    sb.from("usuarios").select("*"),
    sb.from("equipes").select("*"),
    sb.from("especialidades").select("*")
  ]);
  if(!u.error) DB.usuarios = u.data || [];
  if(!eq.error) DB.equipes = eq.data || [];
  if(!es.error) DB.especialidades = es.data || [];
}
async function loadAll(){
  const [u,t,c,n,tm,ci,ca,av,avn,eq,es] = await Promise.all([
    sb.from("usuarios").select("*"),
    sb.from("tarefas").select("*"),
    sb.from("comentarios_tarefa").select("*"),
    sb.from("notificacoes").select("*").order("criado_em", { ascending:false }),
    sb.from("temas").select("*"),
    sb.from("categorias_impedimento").select("*"),
    sb.from("criterios_avaliacao").select("*"),
    sb.from("avaliacoes").select("*"),
    sb.from("avaliacoes_notas").select("*"),
    sb.from("equipes").select("*"),
    sb.from("especialidades").select("*")
  ]);
  DB.usuarios = u.data || [];
  DB.tarefas = t.data || [];
  DB.comentarios = c.data || [];
  DB.notificacoes = n.data || [];
  DB.temas = tm.data || [];
  DB.categorias = ci.data || [];
  DB.criterios = ca.data || [];
  DB.avaliacoes = av.data || [];
  DB.avaliacoesNotas = avn.data || [];
  DB.equipes = eq.data || [];
  DB.especialidades = es.data || [];
}

function getUser(id){ return DB.usuarios.find(u => u.id === id); }
function getDirectReports(id){ return DB.usuarios.filter(u => u.lider_id === id && u.ativo !== false); }
function getSubtreeIds(id){
  let ids = [id];
  getDirectReports(id).forEach(u => { ids = ids.concat(getSubtreeIds(u.id)); });
  return ids;
}
function tasksFor(userId){ return DB.tarefas.filter(t => t.atribuido_a === userId); }
function tasksForSubtree(id){
  const ids = new Set(getSubtreeIds(id).filter(x => x !== id));
  return DB.tarefas.filter(t => ids.has(t.atribuido_a));
}
function temaNome(id){ const t = DB.temas.find(x=>x.id===id); return t ? t.nome : "Geral"; }
function equipeNome(id){ const e = DB.equipes.find(x=>x.id===id); return e ? e.nome : null; }
function especialidadeNome(id){ const e = DB.especialidades.find(x=>x.id===id); return e ? e.nome : null; }
function addNotif(usuarioId, tipo, mensagem){
  return sb.from("notificacoes").insert({ usuario_id: usuarioId, tipo, mensagem });
}

function farolInfo(t){
  if(t.status === "concluida") return { label:"Concluído", cls:"ok" };
  if(t.status === "cancelada") return { label:"Cancelada", cls:"muted" };
  if(t.status === "impedida") return { label:"Impedida", cls:"warn" };
  if(t.status === "aguardando_reatribuicao") return { label:"Sem responsável", cls:"danger" };
  if(t.status === "pendente_aprovacao") return { label:"Aguardando aprovação", cls:"muted" };
  if(t.status === "recusada") return { label:"Recusada", cls:"muted" };
  const hoje = new Date(todayISO());
  const prazo = new Date(t.prazo);
  prazo.setDate(prazo.getDate() + (t.dias_pausados||0));
  const diff = Math.round((prazo - hoje) / 86400000);
  if(diff < 0) return { label:"Atrasado", cls:"danger" };
  if(diff <= 3) return { label:"Próximo do vencimento", cls:"warn" };
  return { label:"No prazo", cls:"accent" };
}
function statusLabel(s){
  return { a_fazer:"A fazer", em_andamento:"Em andamento", concluida:"Concluída", cancelada:"Cancelada",
    pendente_aprovacao:"Aguardando aprovação", recusada:"Recusada",
    aguardando_reatribuicao:"Aguardando reatribuição", impedida:"Impedida" }[s] || s;
}
function computePerformance(userId){
  const tasks = tasksFor(userId);
  const concluidas = tasks.filter(t => t.status === "concluida");
  if(!concluidas.length) return null;
  const noPrazo = concluidas.filter(t => !t.concluido_em || new Date(t.concluido_em) <= new Date(t.prazo)).length;
  return { pct: Math.round((noPrazo/concluidas.length)*100), total: concluidas.length };
}
function currentUser(){ return getUser(STATE.currentUserId); }

// ---------- GAUGE ----------
function gaugeSvg(pct){
  const angle = 180 * (1 - pct/100);
  const rad = angle * Math.PI/180;
  const nx = (200 + 130*Math.cos(rad)).toFixed(1);
  const ny = (200 - 130*Math.sin(rad)).toFixed(1);
  const cls = pct >= 90 ? "var(--ok-text)" : (pct >= 70 ? "var(--warn-text)" : "var(--danger-text)");
  return `<svg width="100%" viewBox="0 0 400 250" role="img" style="max-width:280px;display:block;margin:0 auto;">
    <title>Ponteiro de entregas no prazo</title><desc>${pct}% de entregas no prazo, meta 90%</desc>
    <path d="M 68 200 A 150 150 0 0 1 172.8 79.1" fill="none" stroke="#E24B4A" stroke-width="24" stroke-linecap="round"/>
    <path d="M 178.2 76.4 A 150 150 0 0 1 226.4 76.4" fill="none" stroke="#EF9F27" stroke-width="24" stroke-linecap="round"/>
    <path d="M 231.8 79.1 A 150 150 0 0 1 332 200" fill="none" stroke="#639922" stroke-width="24" stroke-linecap="round"/>
    <line x1="200" y1="200" x2="${nx}" y2="${ny}" stroke="var(--text)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="200" cy="200" r="7" fill="var(--text)"/>
    <text x="200" y="236" text-anchor="middle" style="font-size:22px;font-weight:700;fill:${cls};font-family:inherit;">${pct}%</text>
  </svg>`;
}

function getCargoIcon(cargo){
  const c = (cargo||"").toLowerCase();
  if(c.includes("gestor")) return "&#128100;";
  if(c.includes("supervisor")) return "&#128101;";
  if(c.includes("planejamento") && c.includes("técnic")) return "&#128200;";
  if(c.includes("planejamento")) return "&#128203;";
  if(c.includes("elétric") || c.includes("eletric")) return "&#9889;";
  if(c.includes("automa")) return "&#129302;";
  if(c.includes("mecânic") || c.includes("mecanic")) return "&#9881;";
  if(c.includes("solda") || c.includes("inspetor")) return "&#128295;";
  if(c.includes("topograf")) return "&#128207;";
  if(c.includes("coordenador")) return "&#9881;";
  if(c.includes("qualidade")) return "&#9989;";
  return "&#128100;";
}
function isGreenRole(cargo){ const c = (cargo||"").toLowerCase(); return c.includes("gestor") || c.includes("supervisor"); }
const TEAM_PALETTE = ["#f0b400","#1c8a4b","#7c5cbf","#c0392b","#0f9b8e","#8a5a2b"];
function teamColor(index){ return TEAM_PALETTE[index % TEAM_PALETTE.length]; }
function toggleSpotlight(equipeId){
  if(!equipeId) return;
  STATE.spotlightEquipe = (STATE.spotlightEquipe === equipeId) ? null : equipeId;
  render();
}
function renderTeamLegend(){
  if(!DB.equipes.length) return "";
  return `<div class="team-legend">
    ${DB.equipes.map((eq,i) => `<div class="team-chip ${STATE.spotlightEquipe===eq.id?'active':''}" onclick="toggleSpotlight('${eq.id}')">
      <span class="team-dot" style="background:${teamColor(i)};"></span>${esc(eq.nome)}
    </div>`).join("")}
    ${STATE.spotlightEquipe ? `<button class="small ghost" onclick="STATE.spotlightEquipe=null;render()">Limpar seleção</button>` : ""}
  </div>`;
}
function orgCardHtml(u){
  const reports = getDirectReports(u.id);
  const colorCls = isGreenRole(u.cargo) ? "leader" : "";
  const iconContent = u.foto_url ? `<img src="${u.foto_url}" alt=""/>` : `<span style="color:#fff;">${getCargoIcon(u.cargo)}</span>`;

  return `<div class="org-card ${colorCls} ${reports.length?'has-children':''} ${stateCls}"${clickAttr}>

async function doLogin(){
  const email = document.getElementById("login-email").value.trim();
  const senha = document.getElementById("login-senha").value;
  if(!email || !senha) return;
  STATE.busy = true; render();
  const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
  STATE.busy = false;
  if(error){ toast("Erro ao entrar: " + error.message); render(); return; }
  await afterLogin(data.session);
}
async function resolveExtensibleId(table, selectId, newInputId, label){
  const val = document.getElementById(selectId).value;
  if(val !== "__nova__") return val || null;
  const nome = document.getElementById(newInputId).value.trim();
  if(!nome) return null;
  const { data, error } = await sb.from(table).insert({ nome }).select().single();
  if(error){ toast(`Erro ao criar ${label}: ` + error.message); return null; }
  return data.id;
}
async function doSignup(){
  const nome = document.getElementById("su-nome").value.trim();
  const cargo = document.getElementById("su-cargo").value.trim();
  const liderId = document.getElementById("su-lider").value || null;
  const equipeId = await resolveExtensibleId("equipes", "su-equipe", "su-nova-equipe", "equipe");
  const especialidadeId = await resolveExtensibleId("especialidades", "su-especialidade", "su-nova-especialidade", "especialidade");
  const email = document.getElementById("su-email").value.trim();
  const senha = document.getElementById("su-senha").value;
  if(!nome || !cargo || !email || !senha){ toast("Preencha todos os campos."); return; }
  STATE.busy = true; render();
  const { data, error } = await sb.auth.signUp({
    email, password: senha,
    options: { data: { nome, cargo, lider_id: liderId, equipe_id: equipeId, especialidade_id: especialidadeId } }
  });
  STATE.busy = false;
  if(error){ toast("Erro ao criar conta: " + error.message); render(); return; }
  if(data.session){ await afterLogin(data.session); }
  else{ toast("Conta criada! Verifique seu e-mail para confirmar antes de entrar."); STATE.authMode = "login"; go("login"); }
}
async function afterLogin(session){
  SESSION = session;
  await loadAll();
  STATE.currentUserId = session.user.id;
  if(!getUser(STATE.currentUserId)){
    toast("Seu perfil ainda está sendo criado, tente novamente em instantes.");
  }
  STATE.tab = "minhas"; STATE.view = "kanban";
  go("main");
}
async function logout(){
  await sb.auth.signOut();
  SESSION = null; STATE.currentUserId = null; STATE.notifOpen = false;
  go("menu");
}

function renderMinhasTarefas(cu){
  let tasks = tasksFor(cu.id).filter(t => t.status !== "recusada" && t.status !== "pendente_aprovacao");

  const perf = computePerformance(cu.id);
  return `

      <p class="muted-text" style="text-align:center;">Minha performance</p>

    </div>` : ""}
    ${renderViewSwitcher()}
    ${renderTaskViews(tasks, true)}
    <div style="margin-top:20px;">
      ${STATE.showProposeForm ? renderProposeForm(cu) : `<button onclick="STATE.showProposeForm=true;render()"><span style="margin-right:4px;">+</span>Nova tarefa</button>`}

async function submitPropose(userId){
  if(STATE.submitting) return;
  const titulo = document.getElementById("pf-titulo").value.trim();
  const temaId = document.getElementById("pf-tema").value;
  const prazo = document.getElementById("pf-prazo").value || todayISO();
  if(!titulo) return;
  STATE.submitting = true; render();
  const cu = getUser(userId);
  const ok = await mutate(sb.from("tarefas").insert({
    titulo, tema_id: temaId, prioridade:"Média", prazo, status:"a_fazer",
    origem:"liderado", criado_por: userId, atribuido_a: userId
  }));
  if(ok && cu.lider_id) await addNotif(cu.lider_id, "tarefa_criada", `${cu.nome} criou a tarefa "${titulo}"`);
  STATE.showProposeForm = false;
  STATE.submitting = false;
  await loadAll(); render();
}

async function submitNewTask(){

// ---------- Avaliação ----------
let notasAtuais = {};
function renderAvaliacao(cu){
  const reports = getDirectReports(cu.id);
  if(!reports.length) return `<p class="empty-hint">Você não tem liderados diretos para avaliar.</p>`;
  if(!STATE.avaliacaoLiderado || !reports.find(r=>r.id===STATE.avaliacaoLiderado)) STATE.avaliacaoLiderado = reports[0].id;
  const liderado = getUser(STATE.avaliacaoLiderado);
  const perf = computePerformance(liderado.id);
  const trimestre = currentTrimestre();
  const existente = DB.avaliacoes.find(a => a.usuario_avaliado_id === liderado.id && a.trimestre === trimestre);
  const notasExistentes = {};
  if(existente){ DB.avaliacoesNotas.filter(n=>n.avaliacao_id===existente.id).forEach(n=>{ notasExistentes[n.criterio_id] = n.nota; }); }

  return `
    <label class="field-label">Liderado</label>
    <select style="margin-bottom:16px;" onchange="notasAtuais={};STATE.avaliacaoLiderado=this.value;render()">
      ${reports.map(r=>`<option value="${r.id}" ${r.id===liderado.id?'selected':''}>${esc(r.nome)}</option>`).join("")}
    </select>
    <div class="card" style="margin-bottom:16px;">
      <p class="muted-text" style="text-align:center;">Performance de ${esc(liderado.nome)}</p>
      ${perf ? gaugeSvg(perf.pct) : `<p class="empty-hint">Ainda sem tarefas concluídas.</p>`}
    </div>
    <p class="muted-text" style="margin-bottom:6px;">Avaliação ${trimestre} · privada, visível só para você ${existente ? '<span class="badge accent">já avaliado neste trimestre</span>' : ''}</p>
    <div class="card">
      <div id="criterios-box">${DB.criterios.map(c => criterioRow(c, notasAtuais[c.id] !== undefined ? notasAtuais[c.id] : (notasExistentes[c.id]||3))).join("")}</div>
      <div class="row" style="margin-top:10px;">
        <input type="text" id="novo-criterio-input" placeholder="Novo critério (ex: capacidade técnica)" style="flex:1;" />
        <button class="small" onclick="addCriterio()">Adicionar</button>
      </div>
      <p class="muted-text" style="margin:6px 0 0;">Novos critérios passam a valer para toda a empresa, a partir de agora.</p>
      <label class="field-label" style="margin-top:14px;">Observações</label>
      <textarea id="aval-obs" rows="2" style="margin-bottom:12px;">${existente ? esc(existente.observacoes||"") : ""}</textarea>
      <button class="primary" style="width:100%;" onclick="salvarAvaliacao('${liderado.id}')">Salvar avaliação</button>
    </div>`;
}
function criterioRow(criterio, valor){
  let stars = "";
  for(let i=1;i<=5;i++){ stars += `<span class="star ${i<=valor?'filled':''}" onclick="setNota('${criterio.id}',${i})">&#9733;</span>`; }
  return `<div class="star-row" data-criterio="${criterio.id}"><span style="font-size:13px;">${esc(criterio.nome)}</span><div>${stars}</div></div>`;
}
function setNota(criterioId, valor){
  notasAtuais[criterioId] = valor;
  const row = document.querySelector(`.star-row[data-criterio="${criterioId}"]`);
  if(row){ row.querySelectorAll(".star").forEach((s,i)=> s.classList.toggle("filled", i < valor)); }
}
async function addCriterio(){
  const input = document.getElementById("novo-criterio-input");
  const nome = input.value.trim();
  if(!nome) return;
  await mutate(sb.from("criterios_avaliacao").insert({ nome }));
  render();
}
async function salvarAvaliacao(lideradoId){
  const trimestre = currentTrimestre();
  const observacoes = document.getElementById("aval-obs").value.trim();
  const { data: avalRow, error: avalErr } = await sb.from("avaliacoes")
    .upsert({ usuario_avaliado_id: lideradoId, avaliador_id: STATE.currentUserId, trimestre, observacoes },
      { onConflict: "usuario_avaliado_id,trimestre" })
    .select().single();
  if(avalErr){ toast("Erro: " + avalErr.message); return; }
  for(const c of DB.criterios){
    const row = document.querySelector(`.star-row[data-criterio="${c.id}"]`);
    const nota = row ? row.querySelectorAll(".star.filled").length || 3 : 3;
    await sb.from("avaliacoes_notas").upsert(
      { avaliacao_id: avalRow.id, criterio_id: c.id, nota },
      { onConflict: "avaliacao_id,criterio_id" }
    );
  }
  notasAtuais = {};
  await loadAll(); render();
  toast("Avaliação salva.");
}

// ---------- Desvios ----------
function renderDesvios(cu){
  const subtreeIds = new Set(getSubtreeIds(cu.id).filter(id=>id!==cu.id));
  const subtreeTaskIds = new Set(DB.tarefas.filter(t=>subtreeIds.has(t.atribuido_a)).map(t=>t.id));
  const imped = DB.comentarios.filter(c => c.tipo==="impedimento" && subtreeTaskIds.has(c.tarefa_id));
  const resolucoes = DB.comentarios.filter(c => c.tipo==="resolucao" && subtreeTaskIds.has(c.tarefa_id));
  const diasTotal = resolucoes.reduce((s,c)=>s+(c.dias||0),0);
  const tempoMedio = resolucoes.length ? (diasTotal/resolucoes.length).toFixed(1) : "-";
  const counts = {};
  imped.forEach(c => { const cat = DB.categorias.find(x=>x.id===c.categoria_id); const nome = cat?cat.nome:"Outro"; counts[nome] = (counts[nome]||0)+1; });
  const labels = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  return `
    <p class="muted-text" style="margin-bottom:14px;">Visível só para você · motivos de impedimento da equipe</p>
    <div class="grid3" style="margin-bottom:20px;">
      <div class="card" style="text-align:center;"><p class="muted-text">Impedimentos</p><p style="font-size:20px;font-weight:700;margin:0;">${imped.length}</p></div>
      <div class="card" style="text-align:center;"><p class="muted-text">Dias parados</p><p style="font-size:20px;font-weight:700;margin:0;">${diasTotal}</p></div>
      <div class="card" style="text-align:center;"><p class="muted-text">Tempo médio p/ resolver</p><p style="font-size:20px;font-weight:700;margin:0;">${tempoMedio}${tempoMedio!=="-"?" dias":""}</p></div>
    </div>
    ${labels.length ? `<div style="position:relative;width:100%;height:${Math.max(160, labels.length*44+60)}px;">
      <canvas id="devios-canvas" role="img" aria-label="Motivos de impedimento mais frequentes">${labels.map(l=>l+": "+counts[l]).join(". ")}</canvas>
    </div>` : `<p class="empty-hint">Nenhum impedimento registrado ainda.</p>`}`;
}
function renderDeviosChart(){
  const canvas = document.getElementById("devios-canvas");
  if(!canvas || typeof Chart === "undefined") return;
  const cu = currentUser();
  const subtreeIds = new Set(getSubtreeIds(cu.id).filter(id=>id!==cu.id));
  const subtreeTaskIds = new Set(DB.tarefas.filter(t=>subtreeIds.has(t.atribuido_a)).map(t=>t.id));
  const imped = DB.comentarios.filter(c => c.tipo==="impedimento" && subtreeTaskIds.has(c.tarefa_id));
  const counts = {};
  imped.forEach(c => { const cat = DB.categorias.find(x=>x.id===c.categoria_id); const nome = cat?cat.nome:"Outro"; counts[nome] = (counts[nome]||0)+1; });
  const labels = Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  if(deviosChart){ deviosChart.destroy(); deviosChart = null; }
  if(!labels.length) return;
  deviosChart = new Chart(canvas, {
    type: "bar",
    data: { labels, datasets: [{ data: labels.map(l=>counts[l]), backgroundColor: "#2a78d6", borderRadius: 4, barThickness: 22 }] },
    options: { indexAxis:"y", responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{ x:{ beginAtZero:true, ticks:{ stepSize:1, color:"#898781" }, grid:{ color:"#e1e0d9" } }, y:{ ticks:{ color:"#52514e" }, grid:{ display:false } } } }
  });
}

async function removerColaborador(userId){
  const u = getUser(userId);
  await mutate(sb.from("usuarios").update({ ativo:false }).eq("id", userId));
  const abertas = DB.tarefas.filter(t => t.atribuido_a === userId && t.status !== "concluida");
  for(const t of abertas){
    await sb.from("tarefas").update({ status:"aguardando_reatribuicao", equipe_lider_id: STATE.currentUserId, atribuido_a: null }).eq("id", t.id);

  if(abertas.length) await addNotif(STATE.currentUserId, "aguardando_reatribuicao", `${abertas.length} tarefa(s) de ${u.nome} precisam de novo responsável`);

document.getElementById("hidden-photo-input").addEventListener("change", async function(e){
  const file = e.target.files[0];
  if(!file || !STATE.photoUploadTarget) return;
  const reader = new FileReader();
  reader.onload = async function(ev){
    await mutate(sb.from("usuarios").update({ foto_url: ev.target.result }).eq("id", STATE.photoUploadTarget));
    STATE.photoUploadTarget = null; e.target.value = "";

  };
  reader.readAsDataURL(file);
});

const STATUS_STYLE = {
  a_fazer:   { icon:"&#128203;", grad:"linear-gradient(135deg,#f0b400,#c68e00)" },
  em_andamento: { icon:"&#128295;", grad:"linear-gradient(135deg,#1660ae,#0f4a86)" },

};
const PRIORIDADE_STYLE = {

  Média: { icon:"&#9889;",  grad:"linear-gradient(135deg,#f0b400,#c68e00)" },
  Baixa: { icon:"&#127793;", grad:"linear-gradient(135deg,#1660ae,#0f4a86)" }
};
function kanbanColHtml(title, count, bodyHtml, style){
  const headerBg = style ? `background:${style.grad};` : "";
  const titleColor = style ? "color:#fff;" : "";

function renderTaskViews(tasks){
  if(!tasks.length) return `<p class="empty-hint">&#127775; Tudo limpo por aqui — nenhuma tarefa nesse filtro.</p>`;
  if(STATE.view === "kanban"){
    const cols = { a_fazer: [], em_andamento: [], concluida: [] };
    tasks.forEach(t => { if(cols[t.status]) cols[t.status].push(t); });
    return `<div class="grid3">${["a_fazer","em_andamento","concluida"].map(s =>
      kanbanColHtml(statusLabel(s), (cols[s]||[]).length, (cols[s]||[]).map(t=>taskCardHtml(t, true)).join(""), STATUS_STYLE[s])
    ).join("")}</div>`;
  }
  if(STATE.view === "lista"){
    return `<div style="display:flex;flex-direction:column;gap:8px;">${tasks.map(t => {
      const a = getUser(t.atribuido_a);

    }).join("")}</div>`;
  }
  const cols = { Alta: [], Média: [], Baixa: [] };
  tasks.forEach(t => { (cols[t.prioridade] = cols[t.prioridade] || []).push(t); });
  return `<div class="grid3">${["Alta","Média","Baixa"].map(p =>
    kanbanColHtml(p, (cols[p]||[]).length, (cols[p]||[]).map(t=>taskCardHtml(t, true)).join(""), PRIORIDADE_STYLE[p])

}

          ? `<select onchange="changePrioridade('${t.id}', this.value)" style="width:auto;padding:3px 8px;font-size:11px;">
              <option value="Alta" ${t.prioridade==='Alta'?'selected':''}>Alta</option>
              <option value="Média" ${t.prioridade==='Média'?'selected':''}>Média</option>
              <option value="Baixa" ${t.prioridade==='Baixa'?'selected':''}>Baixa</option>
            </select>`
          : `<span class="badge muted">${esc(t.prioridade)}</span>`}
      </div>
      ${isOwner && ["a_fazer","em_andamento","concluida"].includes(t.status) ? `
        <label class="field-label">Meu status</label>
        <select onchange="changeStatus('${t.id}', this.value)" style="margin-bottom:14px;">
          <option value="a_fazer" ${t.status==='a_fazer'?'selected':''}>A fazer</option>
          <option value="em_andamento" ${t.status==='em_andamento'?'selected':''}>Em andamento</option>
          <option value="concluida" ${t.status==='concluida'?'selected':''}>Concluída</option>
        </select>` : ""}
      ${isLeaderOfOwner && t.status === "impedida" ? `
        <button class="primary" style="width:100%;margin-bottom:14px;" onclick="resolverImpedimento('${t.id}')">Marcar impedimento como resolvido</button>` : ""}
      ${isAncestorOfOwner && ["a_fazer","em_andamento","impedida"].includes(t.status) ? `
        <button style="width:100%;margin-bottom:14px;color:var(--danger);" onclick="cancelarTarefa('${t.id}')">Cancelar tarefa</button>` : ""}
      <div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px;">
        <h3 style="margin-bottom:10px;">Comentários</h3>
        <div style="display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;margin-bottom:10px;">
          ${comments.length ? comments.map(c => {
            const autor = getUser(c.usuario_id);
            const cls = c.tipo==='impedimento' ? 'imp' : (c.tipo==='resolucao' ? 'res' : '');
            const icon = c.tipo==='impedimento' ? ' &#9888;' : (c.tipo==='resolucao' ? ' &#10003;' : '');
            return `<div class="msg">${avatarHtml(autor,22)}<div class="msg-bubble ${cls}">
              <div style="font-size:11px;font-weight:600;margin-bottom:2px;">${autor?esc(autor.nome):""}${icon}</div>
              <div style="font-size:13px;">${esc(c.texto)}</div></div></div>`;
          }).join("") : `<p class="empty-hint" style="padding:10px 0;">Nenhum comentário ainda.</p>`}
        </div>
        <div class="row"><input id="comment-input" placeholder="Escrever comentário" /><button aria-label="Enviar" onclick="sendComment('${t.id}')">&#10148;</button></div>
      </div>
      ${isOwner && t.status !== "impedida" && t.status !== "concluida" ? `
        ${STATE.taskImpedimentoOpen ? `
          <div class="card" style="background:var(--warn-bg);border-color:#f0d9ae;">
            <p style="font-size:13px;font-weight:700;color:var(--warn-text);margin:0 0 8px;">Reportar impedimento</p>
            <label class="field-label">Categoria</label>
            <select id="imp-categoria" style="margin-bottom:8px;">${catOpts}<option value="__nova__">+ Cadastrar nova categoria</option></select>
            <input id="imp-nova-categoria" placeholder="Nome da nova categoria" style="display:none;margin-bottom:8px;" />
            <label class="field-label">O que está faltando</label>
            <input id="imp-recurso" placeholder="Ex: torquímetro" style="margin-bottom:10px;" />
            <div class="row"><button class="ghost" onclick="STATE.taskImpedimentoOpen=false;render()">Cancelar</button><button class="primary" onclick="enviarImpedimento('${t.id}')">Enviar ao líder</button></div>
          </div>` : `<button style="width:100%;color:var(--warn-text);" onclick="STATE.taskImpedimentoOpen=true;render()"><span style="margin-right:6px;">&#9888;</span>Reportar impedimento</button>`}
      ` : ""}
    </div>
  </div>`;
}
async function changeStatus(taskId, status){
  await mutate(sb.from("tarefas").update({ status }).eq("id", taskId));
  openTask(taskId);
}
async function changePrioridade(taskId, prioridade){
  await mutate(sb.from("tarefas").update({ prioridade }).eq("id", taskId));
  openTask(taskId);
}
async function cancelarTarefa(taskId){
  if(!confirm("Cancelar esta tarefa? Ela sai da lista ativa, mas o histórico continua registrado.")) return;
  const ok = await mutate(sb.from("tarefas").update({ status:"cancelada" }).eq("id", taskId));
  if(ok) closeTask();
  render();
}
async function sendComment(taskId){
  const input = document.getElementById("comment-input");
  const texto = input.value.trim();
  if(!texto) return;
  await mutate(sb.from("comentarios_tarefa").insert({ tarefa_id: taskId, usuario_id: STATE.currentUserId, tipo:"comentario", texto }));
  openTask(taskId);
}
document.addEventListener("change", e => {
  if(e.target && e.target.id === "imp-categoria"){
    const box = document.getElementById("imp-nova-categoria");
    if(box) box.style.display = e.target.value === "__nova__" ? "block" : "none";
  }
  if(e.target && /-(equipe|especialidade)$/.test(e.target.id)){
    const boxId = e.target.id.replace(/-(equipe|especialidade)$/, "-nova-$1");
    const box = document.getElementById(boxId);
    if(box) box.style.display = e.target.value === "__nova__" ? "block" : "none";
  }
});
async function enviarImpedimento(taskId){
  let categoriaId = document.getElementById("imp-categoria").value;
  if(categoriaId === "__nova__"){
    const nome = document.getElementById("imp-nova-categoria").value.trim();
    if(!nome) return;
    const { data, error } = await sb.from("categorias_impedimento").insert({ nome }).select().single();
    if(error){ toast("Erro: " + error.message); return; }
    categoriaId = data.id;
  }
  const recurso = document.getElementById("imp-recurso").value.trim();
  if(!recurso) return;
  const t = DB.tarefas.find(x => x.id === taskId);
  const cu = currentUser();
  const ok = await mutate(sb.from("tarefas").update({ status:"impedida", impedido_desde: new Date().toISOString() }).eq("id", taskId));
  if(ok){
    await sb.from("comentarios_tarefa").insert({ tarefa_id: taskId, usuario_id: cu.id, tipo:"impedimento", categoria_id: categoriaId,
      texto: `Falta ${recurso}. Não consigo avançar sem isso.` });
    if(cu.lider_id) await addNotif(cu.lider_id, "impedimento_reportado", `${cu.nome} reportou impedimento em "${t.titulo}"`);
  }
  STATE.taskImpedimentoOpen = false;
  await loadAll(); openTask(taskId);
}
async function resolverImpedimento(taskId){
  const t = DB.tarefas.find(x => x.id === taskId);
  let dias = 1;
  if(t.impedido_desde){ dias = Math.max(1, Math.round((new Date() - new Date(t.impedido_desde)) / 86400000)); }
  const ok = await mutate(sb.from("tarefas").update({
    status:"em_andamento", impedido_desde: null, dias_pausados: (t.dias_pausados||0) + dias
  }).eq("id", taskId));
  if(ok){
    await sb.from("comentarios_tarefa").insert({ tarefa_id: taskId, usuario_id: STATE.currentUserId, tipo:"resolucao", dias,
      texto: `Impedimento resolvido após ${dias} dia(s).` });
  }
  await loadAll(); openTask(taskId);
}

// ---------- init ----------
(async function init(){
  render();
  const { data: { session } } = await sb.auth.getSession();
  if(session){ await afterLogin(session); }
  else{ await loadPublicOrg(); STATE.screen = "menu"; render(); }
})();
</script>
